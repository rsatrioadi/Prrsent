<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prrsent</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Menu bar (single-document interface) -->
  <div id="menu-bar">
    <span class="brand">Prrsent</span>
    <div class="menu">
      <button id="menu-file" class="menu-btn">File</button>
      <div id="menu-file-dropdown" class="menu-dropdown">
        <button id="mi-new">New</button>
        <button id="mi-open">Open…<span class="kbd">⌘O</span></button>
        <div class="menu-sep"></div>
        <button id="mi-save">Save<span class="kbd">⌘S</span></button>
        <button id="mi-saveas">Save As…<span class="kbd">⇧⌘S</span></button>
      </div>
    </div>
    <span id="doc-name" class="doc-name">Untitled</span>
    <input id="project-open-input" type="file" accept=".prrsent,application/json" hidden>
  </div>

  <div id="app">
    <!-- Left: editing panel with 3 tabs -->
    <section id="left-panel" class="panel">
      <nav id="tab-bar" role="tablist">
        <button class="tab active" data-tab="editor" role="tab">Editor</button>
        <button class="tab" data-tab="assets" role="tab">Assets</button>
        <button class="tab" data-tab="theme" role="tab">Theme</button>
      </nav>

      <div class="tab-panels">
        <div class="tab-panel active" data-panel="editor">
          <div id="editor-toolbar"><!-- insertion buttons (M4) --></div>
          <textarea id="editor" spellcheck="false" autocomplete="off" placeholder="# Start your deck&#10;&#10;Write Markdown or HTML. Separate slides with a line of ---"></textarea>
        </div>

        <div class="tab-panel" data-panel="assets">
          <div id="assets-toolbar">
            <label class="tb-btn" for="asset-upload">＋ Upload</label>
            <input id="asset-upload" type="file" multiple
                   accept="image/*,audio/*,video/*" hidden>
            <span class="assets-hint">Reference with <code>asset:filename</code></span>
          </div>
          <div id="asset-list"></div>
        </div>

        <div class="tab-panel" data-panel="theme">
          <div id="theme-toolbar">
            <label for="theme-preset">Preset</label>
            <select id="theme-preset"></select>
            <span class="assets-hint">Edits apply live to every slide</span>
          </div>
          <textarea id="theme-editor" spellcheck="false" autocomplete="off"></textarea>
        </div>
      </div>
    </section>

    <!-- Right: preview panel -->
    <section id="right-panel" class="panel">
      <div id="preview-stage">
        <div id="slide-frame-wrap">
          <!-- scaled 16:9 iframe goes here (M2) -->
        </div>
      </div>

      <div id="nav-bar">
        <button id="nav-home" title="First slide">« Home</button>
        <button id="nav-prev" title="Previous slide">‹ Prev</button>
        <span id="nav-counter">– / –</span>
        <button id="nav-next" title="Next slide">Next ›</button>
        <button id="nav-pdf" title="Export to PDF">⤓ PDF</button>
        <button id="nav-full" title="Slideshow (present)">⤢ Full view</button>
      </div>
    </section>
  </div>

  <!-- Fullscreen slideshow overlay -->
  <div id="show">
    <div id="show-frame-wrap"></div>
    <div id="show-controls">
      <button id="show-prev" title="Previous (←)">‹</button>
      <span id="show-counter">– / –</span>
      <button id="show-next" title="Next (→)">›</button>
      <button id="show-exit" title="Exit (Esc)">✕</button>
    </div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/slides.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/show.js"></script>
  <script src="js/export.js"></script>
  <script src="js/project.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
